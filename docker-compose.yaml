# Local dev: Postgres + Redis + bot (build from Dockerfile).
# On one VPS several bots run in parallel: set a unique COMPOSE_PROJECT_NAME per folder (see .env.example).

name: ${COMPOSE_PROJECT_NAME:-telegram-bot-pooling-hard}

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    secrets:
      - postgres_password
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-telegram_bot_pooling_hard}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  bot:
    image: ${APP_IMAGE:-telegram-bot-pooling-hard}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    secrets:
      - postgres_password
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${POSTGRES_DB:-telegram_bot_pooling_hard}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD_FILE: /run/secrets/postgres_password
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

secrets:
  postgres_password:
    file: ./secrets/postgres_password

volumes:
  postgres_data:
