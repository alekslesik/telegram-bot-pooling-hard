# Production on VPS: pull image from GHCR (no local build). Same layout as docker-compose.yaml.
# Path example: /opt/bots/telegram-bot-pooling-hard — use a unique COMPOSE_PROJECT_NAME per bot on the host.

name: ${COMPOSE_PROJECT_NAME:-telegram-bot-pooling-hard}

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    secrets:
      - postgres_password
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-telegram_bot_pooling_hard}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  bot:
    image: ghcr.io/alekslesik/telegram-bot-pooling-hard:${IMAGE_TAG:-latest}
    env_file:
      - .env
    secrets:
      - postgres_password
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${POSTGRES_DB:-telegram_bot_pooling_hard}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD_FILE: /run/secrets/postgres_password
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      HTTP_HEALTH_ADDR: ${HTTP_HEALTH_ADDR:-:8080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${HTTP_HEALTH_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz > /dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

secrets:
  postgres_password:
    file: ./secrets/postgres_password

volumes:
  postgres_data:
